<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>TeamOCA</title>
  </head>
  <body>
    <!-- ============================================
       ① ヘッダー
       ロゴ画像とナビゲーションリンクを横並びにしよう

       ヒント:
       - ロゴ画像: <img src="img/logo.png" alt="..." width="80">
       - ナビリンク: <a href="#">リンク名</a> を3つ（news, schedule, shop）
       - 外側の div に class="header" をつける
       - ナビ部分を <div class="header-nav"> で囲む
       ============================================ -->
    <div class="header">
      <img src="img/logo.png" alt="TeamOCAロゴ" width="80" />
      <div class="header-nav">
        <a href="#">news</a>
        <a href="#">schedule</a>
        <a href="#">shop</a>
      </div>
    </div>

    <!-- ============================================
       ② Aboutセクション
       チーム名と説明文を中央に表示しよう

       ヒント:
       - <div class="about"> で囲む
       - <h1> でチーム名「TeamOCA」
       - <p> で説明文を1〜2文
       ============================================ -->
    <div class="about">
      <h1>TameOCA</h1>
      <p>
        チームOCAはゲームが大好きなメンバーが集まったチームです。一緒にゲームを楽しみましょう!
      </p>
    </div>
    <!-- ============================================
       ③ メンバーセクション
       メンバーの画像と名前を横並びに表示しよう

       ヒント:
       - <div class="section"> で囲む
       - <h2>MEMBER</h2> で見出し
       - <div class="member-list"> の中に メンバーを並べる
       - 1人分の構造:
           <div class="member">
             <img src="img/member/member_01.jpeg" alt="メンバー1">
             <p>member 1</p>
           </div>
       - member_01 〜 member_04 の4人分を作る

       使える画像:
         img/member/member_01.jpeg
         img/member/member_02.jpeg
         img/member/member_03.jpeg
         img/member/member_04.jpeg
       ============================================ -->
    <div class="section">
      <h2>MEMBER</h2>
      <div class="member=list">
        <div class="member">
          <img src="img/member/member_01jpeg alt=メンバー１" />
          <p>member 1</p>
          <img src="img/member/member_02jpeg alt=メンバー2" />
          <p>member 2</p>
          <img src="img/member/member_03jpeg alt=メンバー3" />
          <p>member 3</p>
          <img src="img/member/member_04jpeg alt=メンバー4" />
          <p>member 4</p>
        </div>
      </div>
    </div>
    <!-- ============================================
       ④ ゲームセクション
       ゲームの画像とタイトルを横並びに表示しよう

       ヒント:
       - ③と同じ構造で class名を変える
       - <div class="section"> → <h2>GAME TITLE</h2>
       - <div class="game-list"> の中に ゲームを並べる
       - 1つ分の構造:
           <div class="game">
             <img src="img/game/game_01.jpeg" alt="ゲーム1">
             <p>GAME 1</p>
           </div>

       使える画像:
         img/game/game_01.jpeg
         img/game/game_02.jpeg
       ============================================ -->
    <div class="section">
      <h2>GAME TITLE</h2>
      <div class="game-list">
        <div class="game">
          <img src="img/game/game_01.jpeg alt=ゲーム１" />
          <p>GAME 1</p>
          <img src="img/game/game_02.jpeg alt=ゲーム2" />
          <p>GAME 2</p>
        </div>
      </div>
    </div>
    <!-- ============================================
       ⑤ お問い合わせセクション

       ヒント:
       - <div class="section"> で囲む
       - <h2>CONTACT</h2>
       - <p> でメールアドレスなどの連絡先を書く
       ============================================ -->
    <div class="section">
      <h2>CONTACT</h2>
      <p>お問い合わせは teamoca@example.comまでご連絡ください。</p>
    </div>
    <!-- ============================================
       ⑥ フッター

       ヒント:
       - <div class="footer"> で囲む
       - <p>&copy; 2026 TeamOCA</p>
       - &copy; は © マークになる特殊文字
       ============================================ -->

    <div class="footer">
      <p>&copy; 2026 TeamOCA</p>
    </div>
  </body>
</html>
